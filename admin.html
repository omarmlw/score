<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  margin-top:100px;
}

button{
  padding:20px;
  font-size:20px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.open{background:green;color:white;}
.closed{background:red;color:white;}
</style>
</head>

<body>

<h2>لوحة التحكم</h2>

<button class="open" onclick="setStatus('open')">🟢 فتح</button>
<button class="closed" onclick="setStatus('closed')">🔴 غلق</button>

<script>

function setStatus(value){

fetch("https://sheetdb.io/api/v1/uyktjb2tkvipj/status/1", {
  method: "PATCH",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    data: {
      status: value
    }
  })
})
.then(() => {
  alert("تم التحديث ✅");
});

}

</script>

</body>
</html>
