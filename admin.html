<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>
<style>
body { text-align:center; font-family:Arial; margin-top:100px; }
button {
  padding:20px;
  font-size:20px;
  margin:10px;
  cursor:pointer;
}
</style>
</head>
<body>

<h2>تبديل حالة المحل</h2>

<button onclick="setStatus('open')">🟢 فتح</button>
<button onclick="setStatus('closed')">🔴 غلق</button>

<script>
function setStatus(val){
  fetch("https://sheetdb.io/api/v1/uyktjb2tkvipj/status/1", {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      data: { status: val }
    })
  })
  .then(res => res.json())
  .then(() => {
    alert("تم التحديث ✅");
  });
}
</script>

</body>
</html>
