<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نتائج المباريات المباشرة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:     #080c14;
      --bg-card:     #0e1624;
      --bg-card2:    #121d30;
      --border:      #1e2d47;
      --accent:      #00d4ff;
      --accent2:     #0090b3;
      --live-red:    #ff3b3b;
      --live-glow:   #ff3b3b55;
      --ended-gray:  #5a6a80;
      --text-main:   #e8f1ff;
      --text-sub:    #7a90b0;
      --gold:        #f0c040;
      --green:       #00e676;
      --font-ar:     'Tajawal', sans-serif;
      --font-en:     'Oswald', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-ar);
      background: var(--bg-deep);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background mesh ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, #0a2a4a44 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, #001a3344 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8,12,20,.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(1rem, 4vw, 3rem);
    }

    .header-inner {
      max-width: 1280px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 1.3rem;
      box-shadow: 0 0 16px var(--accent)55;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: var(--font-ar);
      font-weight: 900;
      font-size: 1.3rem;
      background: linear-gradient(90deg, var(--accent), #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: .5px;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: .82rem;
      color: var(--text-sub);
    }

    .refresh-badge {
      display: flex;
      align-items: center;
      gap: .4rem;
      background: rgba(0,212,255,.08);
      border: 1px solid rgba(0,212,255,.2);
      border-radius: 30px;
      padding: .3rem .8rem;
      color: var(--accent);
      font-size: .78rem;
    }

    .refresh-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-blue 2s infinite;
    }

    @keyframes pulse-blue {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(.7); }
    }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: auto;
      padding: 2rem clamp(1rem, 4vw, 3rem) 4rem;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: .45rem 1.1rem;
      font-size: .82rem;
      display: flex;
      align-items: center;
      gap: .5rem;
      transition: border-color .3s;
    }

    .stat-chip:hover { border-color: var(--accent); }

    .stat-chip .val {
      font-weight: 700;
      font-family: var(--font-en);
      color: var(--accent);
    }

    /* ── FILTER TABS ── */
    .filter-tabs {
      display: flex;
      gap: .5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .5rem 1.2rem;
      color: var(--text-sub);
      font-family: var(--font-ar);
      font-size: .85rem;
      cursor: pointer;
      transition: all .25s;
    }

    .tab-btn:hover { border-color: var(--accent); color: var(--accent); }

    .tab-btn.active {
      background: rgba(0,212,255,.1);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 700;
    }

    /* ── GRID ── */
    .matches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 440px), 1fr));
      gap: 1.25rem;
    }

    /* ── MATCH CARD ── */
    .match-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      animation: cardIn .4s ease both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .match-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent)66;
      box-shadow: 0 12px 40px rgba(0,212,255,.1);
    }

    .match-card.live-card {
      border-color: var(--live-red)55;
      box-shadow: 0 0 0 1px var(--live-red)22;
    }

    .match-card.live-card:hover {
      border-color: var(--live-red);
      box-shadow: 0 12px 40px var(--live-glow);
    }

    /* top stripe */
    .card-stripe {
      height: 3px;
      background: var(--border);
    }

    .live-card .card-stripe {
      background: linear-gradient(90deg, var(--live-red), #ff7070);
      animation: stripe-pulse 2s infinite;
    }

    @keyframes stripe-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .5; }
    }

    /* card header */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .7rem 1.1rem .5rem;
      border-bottom: 1px solid var(--border);
    }

    .league-info {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .78rem;
      color: var(--text-sub);
    }

    .league-icon { font-size: 1rem; }

    .league-name { font-weight: 500; }

    .status-badge {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .75rem;
      font-weight: 700;
      padding: .25rem .7rem;
      border-radius: 20px;
      letter-spacing: .5px;
    }

    .status-badge.live {
      background: rgba(255,59,59,.15);
      color: var(--live-red);
      border: 1px solid var(--live-red)55;
    }

    .status-badge.ended {
      background: rgba(90,106,128,.12);
      color: var(--ended-gray);
      border: 1px solid rgba(90,106,128,.3);
    }

    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--live-red);
      animation: live-blink 1s infinite;
      flex-shrink: 0;
    }

    @keyframes live-blink {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--live-red)88; }
      50%       { opacity: .6; box-shadow: 0 0 0 5px transparent; }
    }

    /* card body */
    .card-body {
      padding: 1.2rem 1.1rem 1rem;
    }

    .match-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: .5rem;
    }

    .team {
      display: flex;
      flex-direction: column;
      gap: .35rem;
    }

    .team.home { align-items: flex-end; text-align: right; }
    .team.away { align-items: flex-start; text-align: left; }

    .team-emblem {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: var(--bg-card2);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      font-size: 1.5rem;
    }

    .team-name {
      font-weight: 700;
      font-size: .95rem;
      color: var(--text-main);
      line-height: 1.2;
    }

    /* score box */
    .score-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .2rem;
      min-width: 80px;
    }

    .score-display {
      display: flex;
      align-items: center;
      gap: .2rem;
    }

    .score-num {
      font-family: var(--font-en);
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1;
      color: #fff;
      min-width: 32px;
      text-align: center;
    }

    .score-sep {
      font-family: var(--font-en);
      font-size: 1.8rem;
      font-weight: 300;
      color: var(--text-sub);
      line-height: 1;
      padding: 0 .1rem;
    }

    .match-time-label {
      font-size: .72rem;
      color: var(--text-sub);
      font-family: var(--font-en);
    }

    .live-card .match-time-label {
      color: var(--live-red);
      font-weight: 600;
    }

    /* card footer */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .6rem 1.1rem .8rem;
      border-top: 1px solid var(--border);
    }

    .match-datetime {
      font-size: .78rem;
      color: var(--text-sub);
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .match-datetime .icon { font-size: .9rem; }

    /* ── EMPTY / LOADING ── */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 440px), 1fr));
      gap: 1.25rem;
    }

    .skeleton-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      height: 180px;
      overflow: hidden;
      position: relative;
    }

    .skeleton-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.04) 50%, transparent 100%);
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-sub);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

    .empty-state p { font-size: 1.05rem; }

    .error-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 2rem;
      color: #ff7070;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: .6rem 1.4rem;
      font-size: .82rem;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: .5rem;
      transition: transform .35s ease;
      z-index: 999;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent)88; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .header-meta .last-updated { display: none; }
      .score-num { font-size: 1.9rem; }
      .team-name { font-size: .85rem; }
      .team-emblem { width: 36px; height: 36px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">⚽</div>
        <span class="logo-text">LiveScores Pro</span>
      </div>
      <div class="header-meta">
        <span class="last-updated" id="lastUpdated">جارٍ التحديث…</span>
        <div class="refresh-badge">
          <div class="refresh-dot"></div>
          تحديث كل 5 ث
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-chip">إجمالي المباريات: <span class="val" id="totalCount">—</span></div>
      <div class="stat-chip">🔴 مباشر: <span class="val" id="liveCount">—</span></div>
      <div class="stat-chip">✅ انتهت: <span class="val" id="endedCount">—</span></div>
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs">
      <button class="tab-btn active" data-filter="all">الكل</button>
      <button class="tab-btn" data-filter="live">مباشر</button>
      <button class="tab-btn" data-filter="ended">انتهت</button>
    </div>

    <!-- Matches grid -->
    <div id="matchesContainer" class="matches-grid">
      <!-- skeleton loading -->
      <div class="skeleton-grid" id="skeletonGrid" style="display:contents">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </div>

  </main>

  <!-- Toast notification -->
  <div id="toast">🔄 تم تحديث البيانات</div>

  <script>
    const API_URL  = 'https://sheetdb.io/api/v1/uyktjb2tkvipj';
    const INTERVAL = 5000;

    let allMatches  = [];
    let activeFilter = 'all';
    let firstLoad   = true;

    // ── TEAM EMOJIS (fallback) ──────────────────────────────────────────────
    const EMOJI_POOL = ['🦁','🐯','🦅','🐺','🦊','🐻','🦂','🦬','🐉','🦄','🌟','⚡'];
    const emojiCache = {};
    function teamEmoji(name) {
      if (!emojiCache[name]) {
        emojiCache[name] = EMOJI_POOL[Math.abs(hashStr(name)) % EMOJI_POOL.length];
      }
      return emojiCache[name];
    }
    function hashStr(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
      return h;
    }

    // ── LEAGUE ICON ─────────────────────────────────────────────────────────
    function leagueIcon(league) {
      if (!league) return '🏆';
      const l = league.toLowerCase();
      if (l.includes('premier') || l.includes('انجليزي')) return '🏴󠁧󠁢󠁥󠁮󠁧󠁿';
      if (l.includes('laliga') || l.includes('اسباني'))  return '🇪🇸';
      if (l.includes('bundesliga') || l.includes('الماني')) return '🇩🇪';
      if (l.includes('serie') || l.includes('ايطالي'))   return '🇮🇹';
      if (l.includes('ligue') || l.includes('فرنسي'))    return '🇫🇷';
      if (l.includes('champions') || l.includes('ابطال'))return '⭐';
      if (l.includes('جزائري') || l.includes('algerie')) return '🇩🇿';
      return '🏆';
    }

    // ── RENDER CARDS ─────────────────────────────────────────────────────────
    function renderMatches(matches) {
      const container = document.getElementById('matchesContainer');
      const skeleton  = document.getElementById('skeletonGrid');

      if (skeleton) skeleton.remove();

      if (!matches.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">⚽</div>
            <p>لا توجد مباريات في هذا التصنيف</p>
          </div>`;
        return;
      }

      // Animate only new/changed cards
      const fragment = document.createDocumentFragment();

      matches.forEach((m, idx) => {
        const isLive   = (m.status || m.الحالة || '').trim() === 'مباشر';
        const status   = (m.status || m.الحالة || 'انتهت').trim();
        const home     = m.home_team   || m.الفريق_الاول || m.team1 || 'الفريق الأول';
        const away     = m.away_team   || m.الفريق_الثاني || m.team2 || 'الفريق الثاني';
        const score    = m.score       || m.النتيجة || '0 - 0';
        const datetime = m.datetime    || m.التاريخ || m.date || '';
        const league   = m.league      || m.الدوري || m.competition || '';
        const minute   = m.minute      || m.الدقيقة || '';

        // Parse score
        const parts = score.replace(/\s/g,'').split('-');
        const s1 = parts[0] || '0';
        const s2 = parts[1] || '0';

        const card = document.createElement('div');
        card.className = `match-card${isLive ? ' live-card' : ''}`;
        card.style.animationDelay = `${idx * 60}ms`;

        card.innerHTML = `
          <div class="card-stripe"></div>
          <div class="card-header">
            <div class="league-info">
              <span class="league-icon">${leagueIcon(league)}</span>
              <span class="league-name">${league || 'دوري'}</span>
            </div>
            <div class="status-badge ${isLive ? 'live' : 'ended'}">
              ${isLive ? '<div class="live-dot"></div>' : ''}
              ${status}
            </div>
          </div>
          <div class="card-body">
            <div class="match-row">
              <div class="team home">
                <div class="team-emblem">${teamEmoji(home)}</div>
                <span class="team-name">${home}</span>
              </div>
              <div class="score-box">
                <div class="score-display">
                  <span class="score-num">${s1}</span>
                  <span class="score-sep">:</span>
                  <span class="score-num">${s2}</span>
                </div>
                <span class="match-time-label">${isLive && minute ? minute + "'" : (isLive ? 'مباشر' : 'انتهت')}</span>
              </div>
              <div class="team away">
                <div class="team-emblem">${teamEmoji(away)}</div>
                <span class="team-name">${away}</span>
              </div>
            </div>
          </div>
          <div class="card-footer">
            <div class="match-datetime">
              <span class="icon">🗓</span>
              <span>${datetime || '—'}</span>
            </div>
          </div>
        `;

        fragment.appendChild(card);
      });

      container.innerHTML = '';
      container.appendChild(fragment);
    }

    // ── FILTER ───────────────────────────────────────────────────────────────
    function applyFilter(filter) {
      activeFilter = filter;
      let filtered = allMatches;
      if (filter === 'live')  filtered = allMatches.filter(m => (m.status || m.الحالة || '').trim() === 'مباشر');
      if (filter === 'ended') filtered = allMatches.filter(m => (m.status || m.الحالة || '').trim() !== 'مباشر');
      renderMatches(filtered);
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilter(btn.dataset.filter);
      });
    });

    // ── FETCH ────────────────────────────────────────────────────────────────
    async function fetchData() {
      try {
        const res  = await fetch(API_URL + '?limit=100&sheet=Sheet1', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        allMatches = Array.isArray(data) ? data : (data.data || []);

        // Stats
        const liveC  = allMatches.filter(m => (m.status || m.الحالة || '').trim() === 'مباشر').length;
        const endedC = allMatches.length - liveC;

        document.getElementById('totalCount').textContent = allMatches.length;
        document.getElementById('liveCount').textContent  = liveC;
        document.getElementById('endedCount').textContent = endedC;

        // Time
        const now = new Date();
        document.getElementById('lastUpdated').textContent =
          'آخر تحديث: ' + now.toLocaleTimeString('ar-DZ', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        applyFilter(activeFilter);

        // Toast (skip first load)
        if (!firstLoad) showToast();
        firstLoad = false;

      } catch (err) {
        console.error('Fetch error:', err);
        const container = document.getElementById('matchesContainer');
        const skeleton  = document.getElementById('skeletonGrid');
        if (skeleton) skeleton.remove();
        container.innerHTML = `
          <div class="error-state">
            <p>⚠️ تعذّر تحميل البيانات — يُعاد المحاولة تلقائياً…</p>
          </div>`;
      }
    }

    // ── TOAST ────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast() {
      const t = document.getElementById('toast');
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
    }

    // ── INIT ─────────────────────────────────────────────────────────────────
    fetchData();
    setInterval(fetchData, INTERVAL);
  </script>

</body>
</html>
