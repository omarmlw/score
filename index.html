<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>حالة المحل</title>
<style>
body { text-align:center; font-family:Arial; margin-top:100px; }
.status { font-size:40px; font-weight:bold; }
.open { color:green; }
.closed { color:red; }
</style>
</head>
<body>

<div id="status" class="status">جاري التحميل...</div>

<script>
fetch("https://sheetdb.io/api/v1/uyktjb2tkvipj")
.then(res => res.json())
.then(data => {
  let s = data[0].status;
  let el = document.getElementById("status");

  if(s === "open"){
    el.innerHTML = "🟢 المحل مفتوح الآن";
    el.className = "status open";
  } else {
    el.innerHTML = "🔴 المحل مغلق حالياً";
    el.className = "status closed";
  }
});
</script>

</body>
</html>
