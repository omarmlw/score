<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نتائج المباريات المباشرة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080c14;--card:#0e1624;--card2:#121d30;--border:#1e2d47;
      --accent:#00d4ff;--accent2:#0090b3;--red:#ff3b3b;--red-g:#ff3b3b44;
      --gray:#5a6a80;--txt:#e8f1ff;--sub:#7a90b0;--gold:#f0c040;
      --fa:'Tajawal',sans-serif;--fe:'Oswald',sans-serif;
    }
    body{font-family:var(--fa);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse 80% 60% at 20% 10%,#0a2a4a44 0%,transparent 60%),
                 radial-gradient(ellipse 60% 50% at 80% 90%,#001a3344 0%,transparent 60%)}

    /* HEADER */
    header{position:sticky;top:0;z-index:100;background:rgba(8,12,20,.93);
      backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 clamp(1rem,4vw,3rem)}
    .hdr{max-width:1280px;margin:auto;display:flex;align-items:center;justify-content:space-between;height:64px;gap:1rem}
    .logo{display:flex;align-items:center;gap:.6rem}
    .logo-ico{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:grid;place-items:center;font-size:1.25rem;box-shadow:0 0 14px var(--accent)55;flex-shrink:0}
    .logo-txt{font-weight:900;font-size:1.2rem;background:linear-gradient(90deg,var(--accent),#fff);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hdr-r{display:flex;align-items:center;gap:.75rem;font-size:.77rem;color:var(--sub)}
    .pill{display:flex;align-items:center;gap:.4rem;background:rgba(0,212,255,.08);
      border:1px solid rgba(0,212,255,.2);border-radius:30px;padding:.28rem .75rem;color:var(--accent)}
    .pdot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pb 2s infinite}
    @keyframes pb{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}

    /* MAIN */
    main{position:relative;z-index:1;max-width:1280px;margin:auto;padding:1.8rem clamp(1rem,4vw,3rem) 4rem}

    .stats{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
    .chip{background:var(--card);border:1px solid var(--border);border-radius:40px;
      padding:.38rem .95rem;font-size:.79rem;display:flex;align-items:center;gap:.4rem;transition:border-color .3s}
    .chip:hover{border-color:var(--accent)}
    .chip .v{font-weight:700;font-family:var(--fe);color:var(--accent)}

    .tabs{display:flex;gap:.5rem;margin-bottom:1.7rem;flex-wrap:wrap}
    .tab{background:var(--card);border:1px solid var(--border);border-radius:8px;
      padding:.42rem 1.05rem;color:var(--sub);font-family:var(--fa);font-size:.81rem;cursor:pointer;transition:all .22s}
    .tab:hover{border-color:var(--accent);color:var(--accent)}
    .tab.on{background:rgba(0,212,255,.1);border-color:var(--accent);color:var(--accent);font-weight:700}

    #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,440px),1fr));gap:1.15rem}

    /* CARD */
    .mc{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;
      position:relative;transition:transform .25s,box-shadow .25s,border-color .25s}
    .mc:hover{transform:translateY(-4px);border-color:var(--accent)66;box-shadow:0 12px 40px rgba(0,212,255,.1)}
    .mc.live{border-color:var(--red)55;box-shadow:0 0 0 1px var(--red)1a}
    .mc.live:hover{border-color:var(--red);box-shadow:0 12px 40px var(--red-g)}
    .mc.new-in{animation:ci .38s ease both}
    @keyframes ci{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    .stripe{height:3px;background:var(--border)}
    .mc.live .stripe{background:linear-gradient(90deg,var(--red),#ff7070);animation:sp 2s infinite}
    @keyframes sp{0%,100%{opacity:1}50%{opacity:.4}}

    .ch{display:flex;align-items:center;justify-content:space-between;
      padding:.62rem 1rem .48rem;border-bottom:1px solid var(--border)}
    .lg{display:flex;align-items:center;gap:.42rem;font-size:.74rem;color:var(--sub)}
    .sbadge{display:flex;align-items:center;gap:.32rem;font-size:.71rem;font-weight:700;
      padding:.2rem .62rem;border-radius:20px;letter-spacing:.4px}
    .sbadge.live{background:rgba(255,59,59,.14);color:var(--red);border:1px solid var(--red)44}
    .sbadge.ended{background:rgba(90,106,128,.11);color:var(--gray);border:1px solid rgba(90,106,128,.28)}
    .ld{width:8px;height:8px;border-radius:50%;background:var(--red);animation:lb 1s infinite;flex-shrink:0}
    @keyframes lb{0%,100%{opacity:1}50%{opacity:.45}}

    .cb{padding:1.05rem 1rem .9rem}
    .mrow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.45rem}
    .team{display:flex;flex-direction:column;gap:.28rem}
    .team.h{align-items:flex-end;text-align:right}
    .team.a{align-items:flex-start;text-align:left}
    .emb{width:42px;height:42px;border-radius:9px;background:var(--card2);
      border:1px solid var(--border);display:grid;place-items:center;font-size:1.4rem}
    .tn{font-weight:700;font-size:.88rem;line-height:1.2}

    .sbox{display:flex;flex-direction:column;align-items:center;gap:.12rem;min-width:82px}
    .sd{display:flex;align-items:center;gap:.15rem}
    .sn{font-family:var(--fe);font-size:2.25rem;font-weight:700;line-height:1;color:#fff;
      min-width:28px;text-align:center;transition:color .35s}
    .sn.flash{color:var(--gold)}
    .ss{font-family:var(--fe);font-size:1.65rem;font-weight:300;color:var(--sub);line-height:1;padding:0 .06rem}

    /* minute area */
    .mwrap{display:flex;align-items:center;gap:.28rem;margin-top:.08rem;min-height:22px}
    .mlbl{font-size:.69rem;color:var(--sub);font-family:var(--fe)}
    .mc.live .mlbl{color:var(--red);font-weight:600}
    .medit{width:18px;height:18px;border-radius:4px;border:1px solid var(--border);
      background:transparent;display:flex;align-items:center;justify-content:center;
      cursor:pointer;opacity:0;transition:opacity .2s,border-color .2s;flex-shrink:0;
      color:var(--sub);font-size:.62rem;padding:0;line-height:1}
    .mc:hover .medit{opacity:1}
    .medit:hover{border-color:var(--accent);color:var(--accent)}
    .minput{font-family:var(--fe);font-size:.7rem;font-weight:600;background:var(--card2);
      border:1px solid var(--accent);border-radius:5px;color:var(--accent);
      width:44px;text-align:center;padding:.16rem .28rem;outline:none}
    .minput::-webkit-inner-spin-button{-webkit-appearance:none}
    .msave{font-family:var(--fa);font-size:.63rem;font-weight:700;background:var(--accent);
      color:#000;border:none;border-radius:5px;padding:.18rem .42rem;cursor:pointer;
      transition:background .2s;white-space:nowrap}
    .msave:hover{background:#00f0ff}

    .cf{display:flex;align-items:center;justify-content:space-between;
      padding:.52rem 1rem .65rem;border-top:1px solid var(--border)}
    .dt{display:flex;align-items:center;gap:.38rem;font-size:.73rem;color:var(--sub)}

    /* skeleton */
    .sk{background:var(--card);border:1px solid var(--border);border-radius:16px;
      height:174px;overflow:hidden;position:relative}
    .sk::after{content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);
      animation:sh 1.4s infinite}
    @keyframes sh{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

    .empty{grid-column:1/-1;text-align:center;padding:4.5rem 2rem;color:var(--sub)}
    .empty .ico{font-size:2.6rem;margin-bottom:.7rem}

    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:var(--accent)88}

    @media(max-width:540px){
      .hdr-r .upd{display:none}
      .sn{font-size:1.8rem}
      .tn{font-size:.82rem}
    }
  </style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="logo">
      <div class="logo-ico">⚽</div>
      <span class="logo-txt">LiveScores Pro</span>
    </div>
    <div class="hdr-r">
      <span class="upd" id="upd">جارٍ التحميل…</span>
      <div class="pill"><div class="pdot"></div>مباشر</div>
    </div>
  </div>
</header>

<main>
  <div class="stats">
    <div class="chip">المباريات: <span class="v" id="cAll">—</span></div>
    <div class="chip">🔴 مباشر: <span class="v" id="cLive">—</span></div>
    <div class="chip">✅ انتهت: <span class="v" id="cEnd">—</span></div>
  </div>
  <div class="tabs">
    <button class="tab on" data-f="all">الكل</button>
    <button class="tab" data-f="live">مباشر</button>
    <button class="tab" data-f="ended">انتهت</button>
  </div>
  <div id="grid">
    <div class="sk"></div><div class="sk"></div>
    <div class="sk"></div><div class="sk"></div>
  </div>
</main>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════════════ */
const API  = 'https://sheetdb.io/api/v1/uyktjb2tkvipj';
const TICK = 2000;

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
let allData      = [];
let activeFilter = 'all';
let firstRender  = true;
const minuteOverride = {}; // { rowId -> string } — local user overrides

/* ═══════════════════════════════════════════════════════════════
   MOCK (fallback when API is unreachable)
═══════════════════════════════════════════════════════════════ */
const MOCK = [
  {id:'1',home_team:'ريال مدريد',   away_team:'برشلونة',    score:'2 - 1',status:'مباشر', datetime:'13/04 - 21:00',league:'الدوري الإسباني',  minute:'67'},
  {id:'2',home_team:'مانشستر سيتي', away_team:'ليفربول',    score:'0 - 0',status:'مباشر', datetime:'13/04 - 20:45',league:'الدوري الإنجليزي', minute:'34'},
  {id:'3',home_team:'بايرن ميونخ',  away_team:'دورتموند',   score:'3 - 2',status:'انتهت', datetime:'13/04 - 18:30',league:'الدوري الألماني',   minute:''},
  {id:'4',home_team:'يوفنتوس',      away_team:'إنتر ميلان', score:'1 - 1',status:'انتهت', datetime:'13/04 - 17:00',league:'الدوري الإيطالي',   minute:''},
  {id:'5',home_team:'باريس سان جيرمان',away_team:'مرسيليا', score:'2 - 0',status:'مباشر', datetime:'13/04 - 21:00',league:'الدوري الفرنسي',    minute:'78'},
  {id:'6',home_team:'الاتحاد',      away_team:'الهلال',     score:'1 - 2',status:'انتهت', datetime:'12/04 - 19:00',league:'دوري روشن السعودي', minute:''},
];

/* ═══════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════ */
const EMOJIS=['🦁','🐯','🦅','🐺','🦊','🐻','🦂','🦬','🐉','🦄','🌟','⚡'];
const EC={};
function emo(n){
  if(!EC[n]){let h=0;for(let i=0;i<n.length;i++)h=Math.imul(31,h)+n.charCodeAt(i)|0;EC[n]=EMOJIS[Math.abs(h)%EMOJIS.length]}
  return EC[n];
}

function lgIco(l=''){
  const s=l.toLowerCase();
  if(s.includes('premier')||s.includes('انجليزي'))return'🏴󠁧󠁢󠁥󠁮󠁧󠁿';
  if(s.includes('laliga')||s.includes('اسباني')) return'🇪🇸';
  if(s.includes('bundesliga')||s.includes('الماني'))return'🇩🇪';
  if(s.includes('serie')||s.includes('ايطالي')) return'🇮🇹';
  if(s.includes('ligue')||s.includes('فرنسي'))  return'🇫🇷';
  if(s.includes('champion')||s.includes('ابطال'))return'⭐';
  if(s.includes('جزائري')||s.includes('algerie'))return'🇩🇿';
  if(s.includes('سعودي')||s.includes('روشن'))   return'🇸🇦';
  return'🏆';
}

function rowId(m,idx){ return String(m.id||m.rowid||m.row_id||idx); }

function ex(m){
  return {
    home:   m.home_team  ||m.الفريق_الاول ||m.team1||'الفريق الأول',
    away:   m.away_team  ||m.الفريق_الثاني||m.team2||'الفريق الثاني',
    score:  m.score      ||m.النتيجة      ||'0 - 0',
    status:(m.status     ||m.الحالة       ||'انتهت').trim(),
    dt:     m.datetime   ||m.التاريخ      ||m.date ||'',
    league: m.league     ||m.الدوري       ||m.competition||'',
    minute: m.minute     ||m.الدقيقة      ||'',
  };
}

/* ═══════════════════════════════════════════════════════════════
   BUILD CARD (first time only)
═══════════════════════════════════════════════════════════════ */
function buildCard(m,idx,rid,isNew){
  const {home,away,score,status,dt,league,minute}=ex(m);
  const isLive=status==='مباشر';
  const p=score.replace(/\s/g,'').split('-');
  const s1=p[0]||'0', s2=p[1]||'0';
  const min=minuteOverride[rid]!==undefined?minuteOverride[rid]:minute;
  const minDisp=isLive&&min?min+"'":isLive?'مباشر':'انتهت';

  return `<div class="mc${isLive?' live':''}${isNew?' new-in':''}" data-id="${rid}"${isNew?` style="animation-delay:${idx*55}ms"`:''}>
  <div class="stripe"></div>
  <div class="ch">
    <div class="lg">${lgIco(league)}<span>${league||'دوري'}</span></div>
    <div class="sbadge ${isLive?'live':'ended'}">${isLive?'<div class="ld"></div>':''}${status}</div>
  </div>
  <div class="cb">
    <div class="mrow">
      <div class="team h"><div class="emb">${emo(home)}</div><span class="tn">${home}</span></div>
      <div class="sbox">
        <div class="sd">
          <span class="sn" data-role="s1">${s1}</span>
          <span class="ss">:</span>
          <span class="sn" data-role="s2">${s2}</span>
        </div>
        <div class="mwrap">
          <span class="mlbl" data-role="min">${minDisp}</span>
          ${isLive?`<button class="medit" onclick="openEdit('${rid}',this)" title="تعديل الدقيقة">✏</button>`:''}
        </div>
      </div>
      <div class="team a"><div class="emb">${emo(away)}</div><span class="tn">${away}</span></div>
    </div>
  </div>
  <div class="cf"><div class="dt">🗓 <span>${dt||'—'}</span></div></div>
</div>`;
}

/* ═══════════════════════════════════════════════════════════════
   PATCH CARD (silent — zero flicker)
═══════════════════════════════════════════════════════════════ */
function patchCard(el,m,rid){
  const {score,status,minute}=ex(m);
  const isLive=status==='مباشر';
  const p=score.replace(/\s/g,'').split('-');
  const s1=p[0]||'0', s2=p[1]||'0';

  // scores — flash only on change
  const n1=el.querySelector('[data-role=s1]');
  const n2=el.querySelector('[data-role=s2]');
  if(n1&&n1.textContent!==s1){n1.textContent=s1;flash(n1)}
  if(n2&&n2.textContent!==s2){n2.textContent=s2;flash(n2)}

  // live class / stripe
  el.classList.toggle('live',isLive);

  // status badge
  const sb=el.querySelector('.sbadge');
  if(sb){
    sb.className='sbadge '+(isLive?'live':'ended');
    const dot=sb.querySelector('.ld');
    if(isLive&&!dot) sb.insertAdjacentHTML('afterbegin','<div class="ld"></div>');
    if(!isLive) dot?.remove();
    // update text node
    const tn=[...sb.childNodes].find(n=>n.nodeType===3);
    if(tn) tn.textContent=status; else sb.append(document.createTextNode(status));
  }

  // edit button presence
  const wrap=el.querySelector('.mwrap');
  if(wrap&&!wrap.querySelector('.minput')){ // not in editing mode
    const hasBtn=!!wrap.querySelector('.medit');
    if(isLive&&!hasBtn) wrap.insertAdjacentHTML('beforeend',`<button class="medit" onclick="openEdit('${rid}',this)" title="تعديل الدقيقة">✏</button>`);
    if(!isLive) wrap.querySelector('.medit')?.remove();

    // minute label — respect user override
    const lbl=wrap.querySelector('[data-role=min]');
    if(lbl){
      const ov=minuteOverride[rid];
      const disp=ov!==undefined?ov:minute;
      lbl.textContent=isLive&&disp?disp+"'":isLive?'مباشر':'انتهت';
    }
  }
}

function flash(el){
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
  setTimeout(()=>el.classList.remove('flash'),620);
}

/* ═══════════════════════════════════════════════════════════════
   RENDER — smart: patch existing, insert new, remove stale
═══════════════════════════════════════════════════════════════ */
function render(matches){
  const grid=document.getElementById('grid');
  grid.querySelectorAll('.sk').forEach(s=>s.remove());

  if(!matches.length){
    grid.innerHTML=`<div class="empty"><div class="ico">⚽</div><p>لا توجد مباريات</p></div>`;
    return;
  }

  // index existing DOM cards
  const dom={};
  grid.querySelectorAll('.mc[data-id]').forEach(c=>{dom[c.dataset.id]=c});

  const needed=new Set(matches.map((m,i)=>rowId(m,i)));

  // remove gone
  for(const id in dom){ if(!needed.has(id)) dom[id].remove(); }

  // patch or insert
  matches.forEach((m,idx)=>{
    const rid=rowId(m,idx);
    if(dom[rid]){
      patchCard(dom[rid],m,rid);
    } else {
      const tmp=document.createElement('div');
      tmp.innerHTML=buildCard(m,idx,rid,true).trim();
      const newEl=tmp.firstChild;
      const cards=[...grid.querySelectorAll('.mc')];
      if(idx>=cards.length) grid.appendChild(newEl);
      else grid.insertBefore(newEl,cards[idx]);
    }
  });
}

/* ═══════════════════════════════════════════════════════════════
   FILTER
═══════════════════════════════════════════════════════════════ */
function applyFilter(f){
  activeFilter=f;
  let list=allData;
  if(f==='live')  list=allData.filter(m=>ex(m).status==='مباشر');
  if(f==='ended') list=allData.filter(m=>ex(m).status!=='مباشر');
  render(list);
}

document.querySelectorAll('.tab').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    applyFilter(b.dataset.f);
  });
});

/* ═══════════════════════════════════════════════════════════════
   MINUTE EDIT (inline — card stays in place)
═══════════════════════════════════════════════════════════════ */
function openEdit(rid,btn){
  const wrap=btn.closest('.mwrap');
  const lbl=wrap.querySelector('[data-role=min]');
  const cur=(minuteOverride[rid]!==undefined?minuteOverride[rid]:lbl.textContent).replace("'",'');

  wrap.innerHTML=`
    <input class="minput" type="number" min="0" max="120" value="${cur}" placeholder="دقيقة"/>
    <button class="msave" onclick="saveMin('${rid}',this)">حفظ</button>`;

  const inp=wrap.querySelector('.minput');
  inp.focus();inp.select();
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter') saveMin(rid,wrap.querySelector('.msave'));
    if(e.key==='Escape') cancelEdit(rid,wrap);
  });
}

function saveMin(rid,btn){
  const wrap=btn.closest('.mwrap');
  const val=wrap.querySelector('.minput').value.trim();
  if(val==='') delete minuteOverride[rid]; else minuteOverride[rid]=val;
  patchRemote(rid,val);
  restoreWrap(rid,wrap,val);
}

function cancelEdit(rid,wrap){
  const ov=minuteOverride[rid];
  restoreWrap(rid,wrap,ov!==undefined?ov:'');
}

function restoreWrap(rid,wrap,val){
  const card=wrap.closest('.mc');
  const isLive=card.classList.contains('live');
  const disp=val?val+"'":isLive?'مباشر':'انتهت';
  wrap.innerHTML=`<span class="mlbl" data-role="min">${disp}</span>`+
    (isLive?`<button class="medit" onclick="openEdit('${rid}',this)" title="تعديل الدقيقة">✏</button>`:'');
}

/* ═══════════════════════════════════════════════════════════════
   REMOTE PATCH (fire & forget)
═══════════════════════════════════════════════════════════════ */
async function patchRemote(rid,val){
  try{
    await fetch(`${API}/id/${rid}`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({data:{minute:val}})
    });
  }catch(e){console.warn('remote patch failed',e)}
}

/* ═══════════════════════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════════════════════ */
function updateStats(data){
  const lc=data.filter(m=>ex(m).status==='مباشر').length;
  document.getElementById('cAll').textContent=data.length;
  document.getElementById('cLive').textContent=lc;
  document.getElementById('cEnd').textContent=data.length-lc;
}

/* ═══════════════════════════════════════════════════════════════
   FETCH (every 2s — silent patch)
═══════════════════════════════════════════════════════════════ */
async function fetchData(){
  try{
    const r=await fetch(API,{cache:'no-store',mode:'cors',headers:{'Accept':'application/json'}});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    allData=Array.isArray(d)?d:(d.data||[]);

    updateStats(allData);
    const now=new Date();
    document.getElementById('upd').textContent=
      'آخر تحديث '+now.toLocaleTimeString('ar-DZ',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

    applyFilter(activeFilter);
    firstRender=false;

  }catch(e){
    console.warn('fetch',e);
    if(!allData.length){
      allData=MOCK;
      updateStats(allData);
      applyFilter(activeFilter);
      firstRender=false;
      document.getElementById('upd').textContent='⚠️ بيانات تجريبية';
    }
  }
}

fetchData();
setInterval(fetchData,TICK);
</script>
